version: '3.8'

services:
  # ==========================================
  # MySQL Database Service
  # ==========================================
  db:
    image: mysql:8.0
    container_name: smarthire-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: smarthire_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - smarthire-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # Spring Boot Backend REST API Service
  # ==========================================
  backend:
    build:
      context: ./smarthire-backend
      dockerfile: Dockerfile
    container_name: smarthire-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/smarthire_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads/resumes
    networks:
      - smarthire-network

  # ==========================================
  # React Frontend client Service
  # ==========================================
  frontend:
    build:
      context: ./smarthire-frontend
      dockerfile: Dockerfile
    container_name: smarthire-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - smarthire-network

# ==========================================
# Network & Volume Definitions
# ==========================================
networks:
  smarthire-network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  uploads_data:
    driver: local
